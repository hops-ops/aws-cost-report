apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: aws-cost-report
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-s3
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-cur
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-iam
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-glue
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-athena
    version: '>=v2'
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.0'
  description: Creates CUR export, Glue catalog, and Athena workgroup for cloud cost
    visibility via OpenCost. One per AWS account.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  repository: ghcr.io/hops-ops/aws-cost-report
  source: github.com/hops-ops/aws-cost-report
